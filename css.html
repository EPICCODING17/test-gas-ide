          },
        },
      },

<style>
:root {
  --bs-blue: #3c8cf3;
  --bs-green: #05be8a;
  --bs-purple: #745af2;
  --bs-red: #ef5350;
  --bs-yellow: #ffa726;

  --bs-gray-rgb: 108, 117, 125;
  --bs-blue-rgb: 60, 140, 243;
  --bs-green-rgb: 5, 190, 138;
  --bs-purple-rgb: 116, 90, 242;
  --bs-red-rgb: 239, 83, 80;
  --bs-yellow-rgb: 255, 167, 38;

  --bg-secondary: #ffffff;
  --border-color: #e9e9e9;

  --bg-secondary-glass: rgba(255, 255, 255, 0.75);
  --border-glass: rgba(255, 255, 255, 0.6);
  --border-glass-dark: rgba(255, 255, 255, 0.15);
}
.dark {
  --bg-secondary: #1f2937;
  --border-color: #374151;

  --bg-secondary-glass: rgba(15, 23, 42, 0.75);
  --border-glass: rgba(51, 65, 85, 0.5);
  --border-glass-dark: rgba(30, 41, 59, 0.5);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Prompt", sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* === Bottom Sheet === */
.bottom-sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.bottom-sheet-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.bottom-sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 105;
  background-color: var(--bg-secondary);
  border-top-left-radius: 1.5rem;
  border-top-right-radius: 1.5rem;
  box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.15);
  height: 0;
  transform: translateY(0);
  transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  touch-action: none;
}
.dark .bottom-sheet {
  box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
}
.bottom-sheet.sheet-half {
  height: 60vh;
}
.bottom-sheet.sheet-full {
  height: 95vh;
}
.bottom-sheet .drag-handle {
  width: 40px;
  height: 5px;
  background: #cbd5e1;
  border-radius: 999px;
  margin: 10px auto 6px;
  cursor: grab;
  flex-shrink: 0;
}
.dark .bottom-sheet .drag-handle {
  background: #475569;
}

.menu-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  padding: 0.9rem 0.5rem;
  border-radius: 1.25rem;
  border: 2px solid var(--border-color);
  background: rgba(255, 255, 255, 0.5);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.dark .menu-card {
  border-color: #334155;
  background: rgba(30, 41, 59, 0.3);
}
.menu-card:hover {
  border-color: var(--bs-green) !important;
}
.menu-card.active-card {
  border-color: var(--bs-blue) !important;
  background: rgba(60,140,243,0.08) !important;
}
.dark .menu-card.active-card {
  border-color: #60a5fa !important;
  background: rgba(96,165,250,0.1) !important;
}
.menu-card-icon {
  width: 44px;
  height: 44px;
  border-radius: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.menu-card-label {
  font-size: 11.5px;
  font-weight: 600;
  text-align: center;
  color: #374151;
  line-height: 1.3;
}
.dark .menu-card-label {
  color: #d1d5db;
}

::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 10px;
}
.dark ::-webkit-scrollbar-thumb {
  background: #475569;
}

.bg-pattern {
  background-color: #f8fafc;
  background-image:
    radial-gradient(
      circle at 15% 50%,
      rgba(60, 140, 243, 0.08),
      transparent 30%
    ),
    radial-gradient(
      circle at 85% 30%,
      rgba(116, 90, 242, 0.08),
      transparent 30%
    ),
    radial-gradient(
      circle at 50% 80%,
      rgba(5, 190, 138, 0.06),
      transparent 30%
    );
  background-attachment: fixed;
}
.dark .bg-pattern {
  background-color: #0f172a;
  background-image:
    radial-gradient(
      circle at 15% 50%,
      rgba(60, 140, 243, 0.12),
      transparent 30%
    ),
    radial-gradient(
      circle at 85% 30%,
      rgba(116, 90, 242, 0.12),
      transparent 30%
    ),
    radial-gradient(
      circle at 50% 80%,
      rgba(5, 190, 138, 0.08),
      transparent 30%
    );
  background-attachment: fixed;
}

.theme-nav,
.theme-sidebar {
  background-color: var(--bg-secondary-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
  border-radius: 1.5rem;
}
.dark .theme-nav,
.dark .theme-sidebar {
  border: 1px solid var(--border-glass-dark);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4);
}

.menu-active {
  background: var(--bg-secondary) !important;
  border: 2px solid rgba(60, 140, 243, 0.4) !important;
  box-shadow: none !important;
  color: #3c8cf3 !important;
}
.dark .menu-active {
  background: var(--bg-secondary) !important;
  border: 2px solid rgba(96, 165, 250, 0.4) !important;
  box-shadow: none !important;
  color: #60a5fa !important;
}
.dark .menu-active i {
  color: #60a5fa !important;
}

.menu-item .menu-btn i {
  filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
}
.dark .menu-item .menu-btn i {
  filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
}

@keyframes slideOutUp {
  from {
    opacity: 1;
    transform: translateY(0);
  }
  to {
    opacity: 0;
    transform: translateY(-30px);
  }
}
@keyframes slideOutDown {
  from {
    opacity: 1;
    transform: translateY(0);
  }
  to {
    opacity: 0;
    transform: translateY(30px);
  }
}
@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes slideInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.anim-slide-out-up {
  animation: slideOutUp 0.2s ease-in forwards;
}
.anim-slide-out-down {
  animation: slideOutDown 0.2s ease-in forwards;
}
.anim-slide-in-up {
  animation: slideInUp 0.3s ease-out forwards;
}
.anim-slide-in-down {
  animation: slideInDown 0.3s ease-out forwards;
}
.animate-fade-in-up {
  animation: slideInUp 0.3s ease-out forwards;
}

#toast {
  position: fixed;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-secondary);
  color: var(--bs-gray-rgb);
  border: 1px solid var(--border-color);
  box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.2);
  padding: 0.75rem 1.5rem;
  border-radius: 9999px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.9rem;
  font-weight: 500;
  transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.dark #toast {
  color: white;
}
#toast.toast-visible {
  top: 20px;
}

.dropdown-menu {
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.dropdown-menu.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* === Notification Bell === */
@keyframes bellShake {
  0% { transform: rotate(0); }
  15% { transform: rotate(14deg); }
  30% { transform: rotate(-14deg); }
  45% { transform: rotate(10deg); }
  60% { transform: rotate(-8deg); }
  75% { transform: rotate(4deg); }
  85% { transform: rotate(-2deg); }
  100% { transform: rotate(0); }
}
.bell-shake {
  animation: bellShake 0.6s ease-in-out;
}

@keyframes bellRock {
  0%, 100% { transform: rotate(0deg); }
  20% { transform: rotate(12deg); }
  40% { transform: rotate(-10deg); }
  60% { transform: rotate(6deg); }
  80% { transform: rotate(-4deg); }
}
.bell-loading #notifBellIcon {
  animation: bellRock 1.2s ease-in-out infinite;
  color: var(--bs-blue) !important;
}
.dark .bell-loading #notifBellIcon {
  color: #60a5fa !important;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(60, 140, 243, 0.5); }
  50% { box-shadow: 0 0 8px 3px rgba(60, 140, 243, 0.3); }
}
.notif-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  min-width: 16px;
  height: 16px;
  background: var(--bs-red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 9999px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  line-height: 1;
  pointer-events: none;
  transform: scale(0);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.notif-badge.visible {
  transform: scale(1);
}

.bell-spinner-ring {
  position: absolute;
  top: -1px;
  right: -1px;
  width: 20px;
  height: 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.bell-spinner-ring.active {
  opacity: 1;
}

.bell-spinner-ring::after {
  content: '';
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2.5px solid rgba(60, 140, 243, 0.15);
  border-top-color: var(--bs-blue);
  border-right-color: var(--bs-blue);
  animation: spin 0.6s linear infinite;
  box-sizing: border-box;
}
.bell-spinner-ring.active::after {
  animation: spin 0.6s linear infinite;
  box-shadow: 0 0 6px 1px rgba(60, 140, 243, 0.3);
}
.dark .bell-spinner-ring::after {
  border-color: rgba(96, 165, 250, 0.15);
  border-top-color: #60a5fa;
  border-right-color: #60a5fa;
}
.dark .bell-spinner-ring.active::after {
  box-shadow: 0 0 6px 1px rgba(96, 165, 250, 0.25);
}

.bell-loading .notif-badge {
  transform: scale(0) !important;
}
.notif-dropdown {
  max-height: 340px;
  overflow-y: auto;
}
.notif-item {
  display: flex;
  align-items: flex-start;
  gap: 0.65rem;
  padding: 0.6rem 0.75rem;
  border-radius: 0.75rem;
  transition: background 0.2s;
}
.notif-item:hover {
  background: rgba(60, 140, 243, 0.06);
}
.dark .notif-item:hover {
  background: rgba(96, 165, 250, 0.1);
}
.notif-item .notif-icon {
  min-width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}
.notif-icon.loading {
  background: rgba(60, 140, 243, 0.12);
  color: var(--bs-blue);
}
.notif-icon.loading i {
  animation: spin 0.8s linear infinite;
}
.notif-icon.success {
  background: rgba(5, 190, 138, 0.12);
  color: var(--bs-green);
}
.notif-icon.error {
  background: rgba(239, 83, 80, 0.12);
  color: var(--bs-red);
}
.notif-msg {
  font-size: 13px;
  font-weight: 500;
  color: #374151;
  line-height: 1.4;
}
.dark .notif-msg {
  color: #e5e7eb;
}
.notif-time {
  font-size: 10.5px;
  color: #9ca3af;
  margin-top: 2px;
}
.notif-empty {
  padding: 2rem 1rem;
  text-align: center;
  color: #9ca3af;
  font-size: 13px;
}
.notif-empty i {
  font-size: 2rem;
  margin-bottom: 0.5rem;
  display: block;
  opacity: 0.5;
}

/* sidebar-overlay removed — replaced by menu-sheet-overlay */

.submenu {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out, opacity 0.3s ease-out, margin-top 0.3s ease-out;
  opacity: 0;
  margin-top: 0;
}
.submenu.open {
  max-height: 200px;
  opacity: 1;
  margin-top: 0.5rem;
}
.submenu-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 1rem 0.5rem 3.5rem;
  border-radius: 0.75rem;
  color: var(--bs-gray-rgb);
  font-size: 13.5px;
  transition: all 0.2s;
}
.submenu-btn:hover {
  background-color: rgba(60, 140, 243, 0.1);
  color: #3c8cf3;
}
.dark .submenu-btn {
  color: #9ca3af;
}
.dark .submenu-btn:hover {
  background-color: rgba(96, 165, 250, 0.15);
  color: #60a5fa;
}
.menu-btn .chevron {
  transition: transform 0.3s;
}
.menu-btn.open .chevron {
  transform: rotate(180deg);
}

.mobile-nav {
  position: fixed;
  bottom: 1rem;
  left: 1rem;
  right: 1rem;
  background-color: var(--bg-secondary-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
  border-radius: 1.5rem;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0.5rem 0.5rem;
  transition: all 0.3s;
}
.dark .mobile-nav {
  border: 1px solid var(--border-glass-dark);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
}
.mobile-nav-item {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 60px;
  height: 60px;
  border-radius: 1rem;
  color: var(--bs-gray-rgb);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  gap: 0.25rem;
}
.dark .mobile-nav-item {
  color: #9ca3af;
}
.mobile-nav-item i {
  font-size: 1.5rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: absolute;
  top: 2px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background-color: transparent;
}
.mobile-nav-item span {
  font-size: 10.5px;
  font-weight: 500;
  position: absolute;
  bottom: 4px;
  opacity: 1;
  transition: all 0.3s;
  transform: translateY(0);
}
.mobile-nav-item.active {
  color: #3c8cf3;
}
.dark .mobile-nav-item.active {
  color: #60a5fa;
}

@keyframes cuteBounce {
  0%, 80%, 100% { transform: translateY(-24px) scale(1); }
  84% { transform: translateY(-40px) scale(1.1); }
  88% { transform: translateY(-24px) scale(0.95); }
  92% { transform: translateY(-32px) scale(1.02); }
  96% { transform: translateY(-24px) scale(1); }
}
.mobile-nav-item.active i {
  transform: translateY(-24px);
  background: linear-gradient(135deg, #3c8cf3, #60a5fa);
  color: white;
  box-shadow: 0 4px 15px rgba(60, 140, 243, 0.4);
  border: 4px solid var(--bg-secondary);
  animation: cuteBounce 5s infinite;
}
.dark .mobile-nav-item.active i {
  background: linear-gradient(135deg, #60a5fa, #93c5fd);
  box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
  border: 4px solid #1f2937;
}

.mobile-nav-item.active span {
  transform: translateY(-2px);
  font-weight: 600;
  letter-spacing: 0.3px;
}
.mobile-nav-item:not(.active) span {
  opacity: 0.7;
  transform: translateY(2px);
}
.mobile-nav-item:not(.active) i {
  transform: translateY(-2px);
}

.mobile-nav-center {
  position: relative;
  top: -20px;
  width: 60px;
  height: 60px;
  background: linear-gradient(to top right, #3c8cf3, #60a5fa);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  box-shadow: 0 8px 20px rgba(60, 140, 243, 0.4);
  transition: all 0.2s;
}
.dark .mobile-nav-center {
  background: linear-gradient(to top right, #60a5fa, #93c5fd);
  box-shadow: 0 8px 20px rgba(96, 165, 250, 0.3);
}
.mobile-nav-center i {
  font-size: 2rem;
  transition: transform 0.3s;
}
.mobile-nav-center:active {
  transform: scale(0.9);
}

@keyframes centerPulse {
  0% { transform: scale(1); box-shadow: 0 8px 20px rgba(60, 140, 243, 0.4); }
  50% { transform: scale(1.05); box-shadow: 0 12px 25px rgba(60, 140, 243, 0.6), 0 0 0 10px rgba(60, 140, 243, 0); }
  100% { transform: scale(1); box-shadow: 0 8px 20px rgba(60, 140, 243, 0.4), 0 0 0 0 rgba(60, 140, 243, 0); }
}
.mobile-nav-center.clicked {
  animation: centerPulse 0.4s ease-out;
}
.dark .mobile-nav-center.clicked {
  animation: centerPulseDark 0.4s ease-out;
}
@keyframes centerPulseDark {
  0% { transform: scale(1); box-shadow: 0 8px 20px rgba(96, 165, 250, 0.3); }
  50% { transform: scale(1.05); box-shadow: 0 12px 25px rgba(96, 165, 250, 0.5), 0 0 0 10px rgba(96, 165, 250, 0); }
  100% { transform: scale(1); box-shadow: 0 8px 20px rgba(96, 165, 250, 0.3), 0 0 0 0 rgba(96, 165, 250, 0); }
}

@media (min-width: 1024px) {
  .mobile-nav {
    display: none;
  }
}

@media (max-width: 639px) {
  #notifDropdownMenu {
    position: fixed !important;
    top: 70px !important;
    left: 12px !important;
    right: 12px !important;
    width: auto !important;
    max-width: none !important;
    margin-top: 0 !important;
  }
  #settingsDropdownMenu,
  #profileDropdownMenu {
    position: fixed !important;
    top: 70px !important;
    right: 12px !important;
    left: auto !important;
    width: 260px !important;
    margin-top: 0 !important;
  }
}

.glass-panel {
  background-color: var(--bg-secondary-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
  border-radius: 1.5rem;
}

.dark .glass-panel {
  border: 1px solid var(--border-glass-dark);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4);
}

.form-container {
  position: relative;
  width: 100%;
}

.form-view {
  transition: opacity 0.3s ease, transform 0.3s ease;
  width: 100%;
}

.hidden-form {
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
  pointer-events: none;
}

.active-form {
  position: relative;
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  pointer-events: auto;
}

input:-webkit-autofill,
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus, 
input:-webkit-autofill:active{
    -webkit-box-shadow: 0 0 0 30px var(--bg-secondary) inset !important;
    -webkit-text-fill-color: inherit !important;
    border-radius: 0.75rem;
}

.ios-checkbox {
  --checkbox-size: 22px;
  --checkbox-color: var(--bs-blue);
  --checkbox-bg: rgba(60, 140, 243, 0.15);
  --checkbox-border: #93c5fd;

  position: relative;
  display: inline-block;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  margin-top: 2px;
}

.ios-checkbox input {
  display: none;
}

.checkbox-wrapper {
  position: relative;
  width: var(--checkbox-size);
  height: var(--checkbox-size);
  border-radius: 6px;
  transition: transform 0.2s ease;
}

.checkbox-bg {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  border: 2px solid var(--checkbox-border);
  background: rgba(var(--bs-blue-rgb), 0.06);
  transition: all 0.2s ease;
}

.dark .checkbox-bg {
  background: rgba(var(--bs-blue-rgb), 0.12);
  border-color: #4b5563;
}

.checkbox-icon {
  position: absolute;
  inset: 0;
  margin: auto;
  width: 80%;
  height: 80%;
  color: white;
  transform: scale(0);
  transition: all 0.2s ease;
}

.check-path {
  stroke-dasharray: 40;
  stroke-dashoffset: 40;
  transition: stroke-dashoffset 0.3s ease 0.1s;
}

.ios-checkbox input:checked + .checkbox-wrapper .checkbox-bg {
  background: var(--checkbox-color);
  border-color: var(--checkbox-color);
}

.ios-checkbox input:checked + .checkbox-wrapper .checkbox-icon {
  transform: scale(1);
}

.ios-checkbox input:checked + .checkbox-wrapper .check-path {
  stroke-dashoffset: 0;
}

.ios-checkbox:hover .checkbox-wrapper {
  transform: scale(1.05);
}

.ios-checkbox:active .checkbox-wrapper {
  transform: scale(0.95);
}

.ios-checkbox input:focus + .checkbox-wrapper .checkbox-bg {
  box-shadow: 0 0 0 4px var(--checkbox-bg);
}

@keyframes bounceCheck {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.ios-checkbox input:checked + .checkbox-wrapper {
  animation: bounceCheck 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.no-scrollbar::-webkit-scrollbar {
  display: none;
}
.no-scrollbar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.preloader-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: var(--bg-secondary, #ffffff);
  z-index: 99999;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}

html.dark .preloader-overlay {
  background-color: #1f2937; 
}

.custom-input {
  background-color: var(--bg-secondary);
  border: 2px solid var(--border-color);
  border-radius: 1rem;
  transition: all 0.3s ease;
}

.custom-input:hover,
.custom-input:focus {
  border-color: var(--bs-blue);
  outline: none;
}

/* ───── Overlay ───── */
.preloader-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  /* frosted glass bg */
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(14px) saturate(1.4);
  -webkit-backdrop-filter: blur(14px) saturate(1.4);
  transition: opacity 0.5s ease, visibility 0.5s ease;
}
.preloader-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* ───── Logo card ───── */
.preloader-logo-wrap {
  width: 140px;
  height: 140px;
  perspective: 800px;
}
.preloader-logo-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: logoFlip 2.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
}
.preloader-logo-face {
  position: absolute;
  inset: 0;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
/* Front face — blue */
.face-front {
  background: transparent;
}
.face-back {
  background: transparent;
  transform: rotateY(180deg);
}

@keyframes logoFlip {
  0%   { transform: rotateY(0deg); }
  40%  { transform: rotateY(180deg); }
  50%  { transform: rotateY(180deg); }
  90%  { transform: rotateY(360deg); }
  100% { transform: rotateY(360deg); }
}

/* ───── Loading dots text ───── */
.preloader-text {
  color: rgba(255,255,255,0.82);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 3px;
}
.preloader-text .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--bs-green);
  opacity: 0;
  animation: dotPop 1.4s ease-in-out infinite;
}
.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.22s; }
.dot:nth-child(3) { animation-delay: 0.44s; }

@keyframes dotPop {
  0%, 60%, 100% { opacity: 0.15; transform: translateY(0); }
  30%            { opacity: 1;    transform: translateY(-4px); }
}

/* ───── Progress bar ───── */
.preloader-bar-track {
  width: 160px;
  height: 3px;
  border-radius: 99px;
  background: rgba(255,255,255,0.12);
  overflow: hidden;
}
.preloader-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--bs-blue), var(--bs-green));
  animation: barSlide 2.4s ease-in-out infinite;
  transform-origin: left;
}
@keyframes barSlide {
  0%   { transform: scaleX(0)   translateX(0%); }
  50%  { transform: scaleX(0.7) translateX(0%); }
  100% { transform: scaleX(0)   translateX(160%); }
}

/* demo bg */
.demo-bg {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-family: 'Prompt', sans-serif;
  font-size: 18px; opacity: 0.3;
}

/* === Bottom Sheet === */
.bottom-sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.bottom-sheet-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.bottom-sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 105;
  background-color: var(--bg-secondary);
  border-top-left-radius: 1.5rem;
  border-top-right-radius: 1.5rem;
  box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.15);

  transform: translateY(0);

}
.dark .bottom-sheet {

}
.bottom-sheet.sheet-half {

}
.bottom-sheet.sheet-full {

}
.bottom-sheet .drag-handle {

.dark .bottom-sheet .drag-handle {

}

.clock-btn-in.active {
  background: rgba(var(--bs-green-rgb), 0.1);

}
.clock-btn-out.active {
  background: rgba(var(--bs-red-rgb), 0.1);
  color: var(--bs-red);
  border: 2px solid var(--bs-red);
}

//map
.clock-map-marker {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.clock-map-marker-ring {
  position: absolute;
  top: -4px;
  left: -4px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2.5px solid var(--bs-blue);
  animation: clockMarkerPulse 2s ease-in-out infinite;
  pointer-events: none;
}

.clock-map-marker-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 4px 12px rgba(60,140,243,0.35);

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  animation: clockMarkerBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.clock-map-marker-tail {
  width: 3px;
  height: 10px;
  background: linear-gradient(to bottom, var(--bs-blue), transparent);
  border-radius: 2px;
  margin-top: -1px;
}

.locform-map-marker {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.locform-map-marker-ring {
  position: absolute;
  top: -4px;
  left: -4px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2.5px solid var(--bs-blue);
  animation: clockMarkerPulse 2s ease-in-out infinite;
  pointer-events: none;
}

.locform-map-marker-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 4px 12px rgba(60,140,243,0.35);
  background: rgba(var(--bs-blue-rgb), 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  animation: clockMarkerBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.locform-map-marker-tail {
  width: 3px;
  height: 10px;
  background: linear-gradient(to bottom, var(--bs-blue), transparent);

}

@keyframes clockMarkerPulse {
  0%, 100% { transform: scale(1);   opacity: 0.6; }
  50%       { transform: scale(1.3); opacity: 0; }
}

@keyframes clockMarkerBounce {
  from { transform: translateY(-16px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

@keyframes locationPulse {
  0%, 100% { transform: scale(1);   opacity: 0.4; }
  50%       { transform: scale(1.4); opacity: 0;   }
}

/* ================================
   CALENDAR GRID
================================ */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0.5rem;
}

/* ================================
   DAY CELL
================================ */
.calendar-day-cell {
  background-color: var(--bg-secondary);
  border-radius: 0.75rem;
  padding: 0.75rem;
  height: 140px;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
  cursor: pointer;

  transform: translateY(0) scale(1);
  transition:
    transform 0.22s cubic-bezier(.34, 1.56, .64, 1),
    box-shadow 0.22s ease,
    border-color 0.22s ease,
    background-color 0.22s ease;
}

/* แสงพื้นหลังตอน hover */
.calendar-day-cell::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(60, 140, 243, 0.15),
    rgba(116, 90, 242, 0.10)
  );
  opacity: 0;
  transition: opacity 0.22s ease;
  pointer-events: none;
  z-index: 0;
}

/* ให้ content อยู่เหนือแสงพื้นหลัง */
.calendar-day-cell > * {
  position: relative;
  z-index: 1;
}

/* Hover วันทั่วไป */
.calendar-day-cell:hover {
  animation: calendarPop 0.28s ease both;
  border-color: rgba(60, 140, 243, 0.65);
  box-shadow:
    0 14px 28px rgba(60, 140, 243, 0.20),
    0 0 0 3px rgba(60, 140, 243, 0.08);
}

.calendar-day-cell:hover::before {
  opacity: 1;
}

/* Animation เด้งนุ่ม ๆ */
@keyframes calendarPop {
  0% {
    transform: translateY(0) scale(1);
  }
  60% {
    transform: translateY(-7px) scale(1.045);
  }
  100% {
    transform: translateY(-6px) scale(1.035);
  }
}

/* ================================
   TODAY
================================ */
.calendar-day-cell.today {
  border: 2px solid var(--bs-green);
  box-shadow: 0 0 10px rgba(5, 190, 138, 0.3);
}

.calendar-day-cell.today:hover {
  border-color: var(--bs-green);
  box-shadow:
    0 14px 30px rgba(5, 190, 138, 0.28),
    0 0 0 4px rgba(5, 190, 138, 0.12);
}

.calendar-day-cell.today:hover::before {
  background: linear-gradient(
    135deg,
    rgba(5, 190, 138, 0.22),
    rgba(60, 140, 243, 0.08)
  );
}

/* ================================
   WEEKEND
================================ */
.calendar-day-cell.weekend {
  border: 2px solid var(--bs-red);
  box-shadow: 0 0 10px rgba(239, 83, 80, 0.3);
}

.calendar-day-cell.weekend:hover {
  border-color: var(--bs-red);
  box-shadow:
    0 14px 30px rgba(239, 83, 80, 0.25),
    0 0 0 4px rgba(239, 83, 80, 0.10);
}

.calendar-day-cell.weekend:hover::before {
  background: linear-gradient(
    135deg,
    rgba(239, 83, 80, 0.18),
    rgba(255, 167, 38, 0.12)
  );
}

/* ================================
   HOLIDAY
================================ */
.calendar-day-cell.holiday {
  border: 2px solid var(--bs-red);
  box-shadow: 0 0 10px rgba(239, 83, 80, 0.5);
}

.calendar-day-cell.holiday:hover {
  border-color: var(--bs-red);
  box-shadow:
    0 16px 34px rgba(239, 83, 80, 0.35),
    0 0 0 4px rgba(239, 83, 80, 0.14);
}

.calendar-day-cell.holiday:hover::before {
  background: linear-gradient(
    135deg,
    rgba(239, 83, 80, 0.26),
    rgba(116, 90, 242, 0.10)
  );
}

/* ================================
   DAY HEADER
================================ */
.calendar-day-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.5rem;
  min-height: 24px;
}

.calendar-day-date {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text-primary);
  transition:
    transform 0.22s cubic-bezier(.34, 1.56, .64, 1),
    color 0.22s ease;
}

.calendar-day-name {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  line-height: 1;
  transition: color 0.22s ease;
}

/* ตัวเลขวันที่ขยับตอน hover */
.calendar-day-cell:hover .calendar-day-date {
  transform: scale(1.12);
  color: var(--bs-blue);
}

.calendar-day-cell.today:hover .calendar-day-date {
  color: var(--bs-green);
}

.calendar-day-cell.weekend:hover .calendar-day-date,
.calendar-day-cell.holiday:hover .calendar-day-date {
  color: var(--bs-red);
}

.calendar-day-cell:hover .calendar-day-name {
  color: var(--bs-blue);
}

.calendar-day-cell.today:hover .calendar-day-name {
  color: var(--bs-green);
}

.calendar-day-cell.weekend:hover .calendar-day-name,
.calendar-day-cell.holiday:hover .calendar-day-name {
  color: var(--bs-red);
}

/* ================================
   EVENT LIST
================================ */
.event-list-container {
  flex: 1;
  overflow-y: auto;
  padding-right: 5px;
}

.event-list-container::-webkit-scrollbar {
  width: 5px;
}

.event-list-container::-webkit-scrollbar-thumb {
  background-color: var(--text-secondary);
  border-radius: 6px;
}

.event-list-container::-webkit-scrollbar-track {
  background-color: var(--bg-primary);
}

/* ================================
   EVENT ITEM
================================ */
.calendar-day-event {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.25rem;
  padding: 0.25rem 0.5rem;
  border-radius: 0.5rem;
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-size: 0.8rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;

  transition:
    transform 0.18s ease,
    background-color 0.18s ease,
    box-shadow 0.18s ease,
    filter 0.18s ease;
}

.calendar-day-event:hover {
  transform: translateX(3px) scale(1.02);
  filter: brightness(0.95);
  box-shadow: 0 4px 10px rgba(60, 140, 243, 0.12);
}

body.dark .calendar-day-event {
  background-color: #313a5f;
}

/* ================================
   PROFILE IMAGE
================================ */
.event-profile-pic {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border-color);
}

/* ================================
   EMPTY CELL
   ช่องว่างต้นเดือน ไม่ต้องเด้ง
================================ */
.calendar-day-cell.pointer-events-none,
.calendar-day-cell.opacity-50 {
  cursor: default;
  animation: none !important;
  transform: none !important;
  box-shadow: none !important;
}

.calendar-day-cell.pointer-events-none::before,
.calendar-day-cell.opacity-50::before {
  display: none;
}

/* ================================
   MOBILE
================================ */
@media (max-width: 768px) {
  .calendar-grid {
    grid-template-columns: repeat(1, 1fr);
  }

  .calendar-day-cell {
    height: 120px;
    padding: 0.5rem;
  }

  .calendar-day-date {
    font-size: 1rem;
  }

  .calendar-day-name {
    font-size: 0.65rem;
  }

  .calendar-day-event {
    font-size: 0.7rem;
  }

  .calendar-day-cell:hover {
    animation: calendarPopMobile 0.25s ease both;
  }

  @keyframes calendarPopMobile {
    0% {
      transform: translateY(0) scale(1);
    }
    60% {
      transform: translateY(-4px) scale(1.025);
    }
    100% {
      transform: translateY(-3px) scale(1.018);
    }
  }
}

/* ================================
   TABLET
================================ */
@media (min-width: 769px) and (max-width: 1024px) {
  .calendar-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ================================
   DESKTOP
================================ */
@media (min-width: 1025px) {
  .calendar-grid {
    grid-template-columns: repeat(7, 1fr);
  }
}

@keyframes cnd-dglow{0%,100%{box-shadow:0 0 0 0 rgba(5,190,138,.5)}50%{box-shadow:0 0 0 5px rgba(5,190,138,0)}}

.cnd-nicon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:3px;flex-shrink:0}
.cnd-ntitle{font-size:11.5px;font-weight:600;color:#1e293b;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cnd-nsub{font-size:10px;color:#94a3b8;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dark .cnd-ntitle{color:#e2e8f0}
.dark .cnd-nsub{color:#64748b}
.cnd-badge{display:inline-block;font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:99px;margin-top:4px;letter-spacing:.02em;transition:background .35s,color .35s}
.cnd-badge.cnd-b-ok{background:rgba(5,190,138,.12);color:#059669}
.cnd-badge.cnd-b-err{background:rgba(239,83,80,.1);color:#ef5350}
.dark .cnd-badge.cnd-b-ok{background:rgba(5,190,138,.2);color:#34d399}
.dark .cnd-badge.cnd-b-err{background:rgba(239,83,80,.18);color:#fc8181}

.cnd-hub-wrap{position:relative;width:86px;height:86px;flex-shrink:0;}
.cnd-hub-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(60,140,243,.22);animation:cnd-rpulse 2.6s ease-out infinite}
.cnd-hub-ring:nth-child(2){animation-delay:.87s}
.cnd-hub-ring:nth-child(3){animation-delay:1.73s}
@keyframes cnd-rpulse{0%{transform:scale(1);opacity:.75}100%{transform:scale(1.9);opacity:0}}
.cnd-hub-core{position:absolute;inset:0;border-radius:50%;background:#fff;border:2px solid var(--bs-blue);box-shadow:0 0 0 6px rgba(60,140,243,.1),0 4px 20px rgba(60,140,243,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3;transition:border-color .4s,box-shadow .4s}
.dark .cnd-hub-core{background:rgba(15,23,42,.95)}
.cnd-hub-core.cnd-hub-ok{border-color:var(--bs-green);box-shadow:0 0 0 6px rgba(5,190,138,.12),0 4px 20px rgba(5,190,138,.18)}
.cnd-hub-core.cnd-hub-err{border-color:var(--bs-red);box-shadow:0 0 0 6px rgba(239,83,80,.12),0 4px 20px rgba(239,83,80,.15)}
.cnd-hub-core.cnd-hub-partial{border-color:var(--bs-yellow);box-shadow:0 0 0 6px rgba(255,167,38,.12),0 4px 20px rgba(255,167,38,.15)}
.cnd-hub-emoji{font-size:24px;line-height:1;color:var(--bs-blue)}
.cnd-hub-lbl{font-size:10px;font-weight:700;color:var(--bs-blue);margin-top:2px;letter-spacing:.04em}

.cnd-stats{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 14px}
.cnd-stat{font-size:11px;padding:4px 10px;border-radius:99px;background:rgba(241,245,249,.8);border:1px solid #e2e8f0;color:#64748b;display:flex;align-items:center;gap:5px}
.dark .cnd-stat{background:rgba(30,41,59,.7);border-color:#1e293b;color:#64748b}
.cnd-sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cnd-mobile-list{display:none}

@media(max-width:768px){
  .cnd-scroll-wrap{display:none}
  .cnd-mobile-list{display:block;padding:12px 14px 4px}
  .cnd-mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-color)}
  .dark .cnd-mrow{border-color:#1e293b}
  .cnd-mrow:last-child{border-bottom:none}
  .cnd-mrow-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .cnd-mrow-body{flex:1;min-width:0}
  .cnd-mrow-title{font-size:12px;font-weight:600;color:#1e293b;line-height:1.3}
  .dark .cnd-mrow-title{color:#e2e8f0}
  .cnd-mrow-sub{font-size:10px;color:#94a3b8}
  .cnd-mrow-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
  .cnd-mrow-dot{width:8px;height:8px;border-radius:50%;background:rgba(239,83,80,.7)}
  .cnd-mrow-dot.ok{background:var(--bs-green);animation:cnd-dglow 2s ease-in-out infinite}
  .cnd-mbadge{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .cnd-mbadge.ok{background:rgba(5,190,138,.12);color:#059669}
  .cnd-mbadge.err{background:rgba(239,83,80,.1);color:#ef5350}
  .dark .cnd-mbadge.ok{background:rgba(5,190,138,.2);color:#34d399}
  .dark .cnd-mbadge.err{background:rgba(239,83,80,.18);color:#fc8181}
  .cnd-mhub{display:flex;align-items:center;justify-content:center;padding:14px 0 6px;gap:10px}
  .cnd-mhub-circle{width:44px;height:44px;border-radius:50%;background:#fff;border:2px solid var(--bs-blue);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--bs-blue);box-shadow:0 0 0 4px rgba(60,140,243,.1)}
  .dark .cnd-mhub-circle{background:rgba(15,23,42,.9)}
  .cnd-mhub-info{font-size:11px;font-weight:600;color:var(--bs-blue)}
  .cnd-mhub-sub{font-size:10px;color:#94a3b8}
}

html,
body {
  background: var(--bg) !important;
  color: var(--text);
  font-size: var(--fs);
}

.atlas-body {
  background: var(--bg) !important;
  color: var(--text);
}

button,
input,
textarea,
select {
  font-family: inherit;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: .001ms !important;
    transition-duration: .001ms !important;
  }
}

@keyframes atlasFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes atlasScaleIn { from { opacity: 0; transform: scale(.96) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes atlasSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes atlasShimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
@keyframes atlasPageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes atlasOrbit { to { transform: rotate(360deg); } }
@keyframes atlasPulse { 0%, 100% { opacity: .45; transform: scale(.9); } 50% { opacity: 1; transform: scale(1); } }

.shell {
  height: 100vh;
  display: flex;
  gap: var(--gap);
  padding: var(--gap);
  background: var(--bg);
  overflow: hidden;
}

.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

.content {
  flex: 1;
  min-height: 0;
  overflow: auto;
  padding: 0;
}

.rail {
  width: var(--rail-w);
  flex: 0 0 auto;
  background: var(--rail-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: calc(var(--u) * 2);
  box-shadow: var(--shadow-sm);
}

.rail-logo {
  width: calc(var(--rail-w) - 24px);
  height: calc(var(--rail-w) - 24px);
  min-width: 36px;
  min-height: 36px;
  border-radius: var(--radius);
  display: grid;
  place-items: center;
  background: var(--primary);
  color: var(--primary-fg);
  margin: calc(var(--u) * 1.5) 0 calc(var(--u) * 3);
  overflow: hidden;
}

.rail-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 5px;
}

.rail-logo img[src=""],
.rail-logo img:not([src]) {
  display: none;
}

.rail-logo img:not([src]) + .rail-logo-fallback,
.rail-logo img[src=""] + .rail-logo-fallback {
  display: inline-flex;
}

.rail-logo-fallback {
  display: none;
}

.rail-items {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: calc(var(--u) * 1.5);
  flex: 1;
}

.rail-foot {
  width: 100%;
}

.rail-btn {
  width: 100%;
  min-height: calc(var(--ctrl-h) + 8px);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: var(--rail-fg);
  transition: background .15s, color .15s, transform .12s;
  position: relative;
}

.rail-btn i {
  font-size: calc(var(--icon) + 2px);
}

.rail-btn span {
  font-size: 10px;
  line-height: 1;
  font-weight: 500;
}

.rail-btn:hover {
  background: var(--rail-hover);
  color: var(--rail-fg-active);
}

.rail-btn.active-card,
.rail-btn.menu-active {
  background: var(--rail-active-bg);
  color: var(--rail-fg-active);
}

.rail-btn.active-card::before,
.rail-btn.menu-active::before {
  content: "";
  position: absolute;
  left: -7px;
  top: 22%;
  bottom: 22%;
  width: 3px;
  border-radius: 99px;
  background: var(--primary);
}

.rail[data-collapsed="true"] .rail-btn span {
  display: none;
}

.sidebar {
  width: var(--sidebar-w);
  flex: 0 0 auto;
  background: var(--sidebar-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: width .22s ease, opacity .18s ease, margin .22s ease;
}

.sidebar[data-open="false"] {
  width: 0;
  margin-left: calc(var(--gap) * -1);
  opacity: 0;
  border-width: 0;
  pointer-events: none;
}

.sb-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--pad);
  border-bottom: 1px solid var(--border);
}

.sb-ws {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--primary-fg);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  overflow: hidden;
  flex: 0 0 auto;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.sb-ws .avatar {
  border-radius: 10px;
}

.sb-ws .nm,
.prof-head .nm {
  font-size: .92em;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sb-ws .sub,
.prof-head .sub {
  font-size: .76em;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sb-search {
  position: relative;
  padding: var(--pad);
  border-bottom: 1px solid var(--border);
}

.sb-search i {
  position: absolute;
  left: calc(var(--pad) + 12px);
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint);
}

.sb-search input {
  width: 100%;
  height: var(--ctrl-h);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--text);
  padding: 0 12px 0 38px;
  outline: none;
}

.sb-search input::placeholder {
  color: var(--text-faint);
}

.sb-search input:focus,
.input:focus,
.custom-input:focus {
  border-color: var(--primary) !important;
  box-shadow: 0 0 0 3px var(--ring);
}

.sb-body {
  flex: 1;
  overflow-y: auto;
  padding: calc(var(--u) * 2);
}

.menu-category-group {
  margin-bottom: calc(var(--gap) * .9);
}

.sb-section-title,
.category-title {
  padding: 8px 10px 6px;
  font-size: .72em;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.sb-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: calc(var(--u) * 3);
  min-height: var(--row-h);
  padding: 0 calc(var(--u) * 3);
  border-radius: var(--radius);
  color: var(--text-muted);
  background: transparent;
  transition: background .15s, color .15s, transform .12s;
  text-align: left;
}

.sb-item i {
  width: 18px;
  font-size: 18px;
  color: var(--text-faint);
}

.sb-item:hover {
  background: var(--surface-2);
  color: var(--text);
}

.sb-item.active-card,
.sb-item.menu-active {
  background: var(--primary-soft);
  color: var(--primary-soft-fg);
}

.sb-item.active-card i,
.sb-item.menu-active i {
  color: var(--primary-soft-fg);
}

.sb-item .menu-card-label {
  flex: 1;
  min-width: 0;
  text-align: left;
  color: inherit;
  font-size: .92em;
  font-weight: 500;
}

.sb-item .count {
  margin-left: auto;
  min-width: 20px;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--surface-3);
  color: var(--text-faint);
  font-size: .7em;
  font-weight: 700;
}

.is-soon {
  opacity: .72;
}

.navbar {
  height: var(--nav-h);
  flex: 0 0 auto;
  background: var(--navbar-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  gap: calc(var(--u) * 2.5);
  padding: 0 var(--pad);
  box-shadow: var(--shadow-sm);
}

.btn,
.btn-icon,
.btn-ghost,
.btn-outline {
  font-family: inherit;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: calc(var(--u) * 2);
  height: var(--ctrl-h);
  padding: 0 calc(var(--u) * 4);
  border-radius: var(--radius);
  font-weight: 600;
  font-size: .92em;
  white-space: nowrap;
  transition: background .15s, transform .1s, box-shadow .15s, border-color .15s, color .15s;
}

.btn:active {
  transform: translateY(1px);
}

.btn-primary {
  background: var(--primary) !important;
  color: var(--primary-fg) !important;
  box-shadow: var(--shadow-sm);
}

.btn-primary:hover {
  background: var(--primary-hover) !important;
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
}

.btn-ghost:hover {
  background: var(--surface-2);
  color: var(--text);
}

.btn-outline {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  color: var(--text) !important;
}

.btn-outline:hover {
