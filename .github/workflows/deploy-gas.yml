name: Deploy to Google Apps Script
on:
  push:
    branches: ["main"]
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install googleapis@144
      - run: node .github/deploy-gas.mjs
        env:
          GAS_CREDS: ${{ secrets.GAS_CREDS }}
          GAS_SCRIPT_ID: "1fPoGq9r_uLDu7b6O8Ob1iQWvTkjGEqJHZBPtYeInFKUxLzMkdmz2hRwq"
