// =======================================================
// FETCH SETTING DATA
// =======================================================

const fetchSettingData = () => {
  if (settingsLoaded) {
    return Promise.resolve();
  }
  if (typeof apiConfig !== 'undefined') {
    apiKey = apiConfig.idapi || '';

    sheetWebApp = apiConfig.idsheet || '';

    settingsLoaded = true;
    // console.log('✅ เชื่อมต่อสำเร็จ');

    return Promise.resolve();
  }

  console.error('❌ เชื่อมต่อไม่สำเร็จ');
  throw new Error('API Configuration not found');
};


// =======================================================
// CACHE FUNCTIONS
// =======================================================

function saveCache(key, data) {
  try {
    sessionStorage.setItem(key, JSON.stringify({
      time: Date.now(),
      data: data
    }));
  } catch (error) {
    console.warn(`ไม่สามารถบันทึก cache: ${key}`, error);
  }
}

function loadCache(key, maxAgeMs = 2 * 60 * 1000) {
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return null;

    const cached = JSON.parse(raw);
    const isExpired = Date.now() - cached.time > maxAgeMs;

    if (isExpired) {
      sessionStorage.removeItem(key);
      return null;
    }

    return cached.data;
  } catch (error) {
    console.warn(`ไม่สามารถอ่าน cache: ${key}`, error);
    sessionStorage.removeItem(key);
    return null;
  }
}

// อัปเดต cache เฉพาะ sheet เดียว โดยไม่ลบ cache ของ sheet อื่น
function updateCachedSheet(cacheKey, sheetName, freshRows) {
  try {
    const raw = sessionStorage.getItem(cacheKey);
    if (!raw) return;

    const cached = JSON.parse(raw);
    if (!cached.data) cached.data = {};
    cached.data[sheetName] = freshRows;
    cached.time = Date.now();

    sessionStorage.setItem(cacheKey, JSON.stringify(cached));
  } catch (error) {
    console.warn(`ไม่สามารถอัปเดต cache: ${cacheKey} / ${sheetName}`, error);
  }
}

function clearDataCache() {
  sessionStorage.removeItem('sheet_data');
}

function clearAllDataCache() {
  clearDataCache();
}


// =======================================================
// DATA COMPARE
// =======================================================

function dataHasChanged(newData, oldData) {
  if (!oldData) return true;
  if (!newData) return true;
  if (newData.length !== oldData.length) return true;

  return JSON.stringify(newData) !== JSON.stringify(oldData);
}

function cloneData(data) {
  try {
    return structuredClone(data);
  } catch {
    return JSON.parse(JSON.stringify(data));
  }
}


// =======================================================
// FETCH WITH BACKOFF (สำหรับ 429 / 5xx)
// =======================================================

async function fetchWithBackoff(url, maxRetries = 3) {
  let delay = 500;

  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      const res = await fetch(url);

      if (res.ok) return res;

      if (res.status !== 429 && res.status < 500) {
        return res;
      }

      if (attempt === maxRetries) return res;

      await new Promise(r => setTimeout(r, delay + Math.random() * 200));
      delay *= 2;
    } catch (networkErr) {
      if (attempt === maxRetries) throw networkErr;
      await new Promise(r => setTimeout(r, delay + Math.random() * 200));
      delay *= 2;
    }
  }
}


// =======================================================
// FETCH SINGLE SHEET
// ใช้สำหรับ refresh เฉพาะตารางหลังเพิ่ม/แก้ไข/ลบ
// =======================================================

async function fetchDataFromAPI(sheetId, sheetName, apiKey) {
  if (!settingsLoaded) {
    await fetchSettingData();
  }

  if (!sheetId || !sheetName || !apiKey) {
    console.warn(`ข้อมูลเชื่อมต่อไม่ครบ: ${sheetName}`);
    return [];
  }

  const apiUrl = "https://sheets.googleapis.com/v4/spreadsheets/"
    + sheetId
    + "/values/"
    + encodeURIComponent(sheetName)
    + "?alt=json&key="
    + apiKey;

  try {
    const response = await fetchWithBackoff(apiUrl);

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const data = await response.json();

    if (!data.values) {
      console.warn(`ไม่พบข้อมูลในแผ่นงาน: ${sheetName}`);
      return [];
    }

    return data.values.slice(1);
  } catch (error) {
    console.error(`❌ ดึงข้อมูล ${sheetName} ไม่สำเร็จ`, error);
    return [];
  }
}


// =======================================================
// FETCH BATCH SHEETS
// ลด request จากหลายครั้งเหลือครั้งเดียวต่อ Spreadsheet
// =======================================================

async function fetchBatchDataFromAPI(sheetId, sheetNames, apiKey) {
  if (!settingsLoaded) {
    await fetchSettingData();
  }

  if (!sheetId || !apiKey || !Array.isArray(sheetNames) || sheetNames.length === 0) {
    console.warn('ข้อมูล batch ไม่ครบ');
    return {};
  }

  const ranges = sheetNames
    .map(sheetName => "ranges=" + encodeURIComponent(sheetName))
    .join("&");

  const apiUrl = "https://sheets.googleapis.com/v4/spreadsheets/"
    + sheetId
    + "/values:batchGet?"
    + ranges
    + "&majorDimension=ROWS&key="
    + apiKey;

  try {
    const response = await fetchWithBackoff(apiUrl);

    if (!response.ok) {
      const errorText = await response.text();
      console.error("Batch API Error:", errorText);
      throw new Error("HTTP error! status: " + response.status);
    }

    const result = await response.json();
    const output = {};

    sheetNames.forEach((sheetName, index) => {
      const rangeData = result.valueRanges?.[index];
      const values = rangeData?.values || [];
      output[sheetName] = values.slice(1);
    });

    return output;
  } catch (error) {
    console.error("❌ ดึงข้อมูลแบบ batch ไม่สำเร็จ", error);
    return {};
  }
}

async function fetchBatchDataWithCache(sheetId, sheetNames, apiKey, cacheKey, maxAgeMs = 2 * 60 * 1000) {
  const cached = loadCache(cacheKey, maxAgeMs);

  if (cached) {
    // console.log(`✅ ใช้ข้อมูลจาก cache: ${cacheKey}`);
    return cached;
  }

  const freshData = await fetchBatchDataFromAPI(sheetId, sheetNames, apiKey);
  saveCache(cacheKey, freshData);

  return freshData;
}

// =======================================================
// FETCH ALL DATA

      checkDataDepartments(data.Departments || [], true),

  } catch (error) {
    console.error('เกิดข้อผิดพลาดในการดึงข้อมูล', error);
    showToast?.(`❌ เกิดข้อผิดพลาดในการดึงข้อมูล: ${error.message}`, false, 'error');
    return false;
  }
};
