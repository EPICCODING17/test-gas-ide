              <div class="flex justify-between items-center px-1">
                <div class="flex items-center gap-3">

                    <button type="button" onclick="setPenColor('#3b82f6', this)" class="color-btn w-5 h-5 rounded-full bg-blue-500 hover:ring-2 ring-offset-1 ring-blue-500 dark:ring-offset-gray-800 transition-all"></button>
                    <button type="button" onclick="setPenColor('#ef4444', this)" class="color-btn w-5 h-5 rounded-full bg-red-500 hover:ring-2 ring-offset-1 ring-red-500 dark:ring-offset-gray-800 transition-all"></button>
                  </div>

                <span class="text-gray-500 dark:text-gray-400 mt-1">คลิกเพื่ออัปโหลดลายเซ็น</span>

<div id="avatarModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity duration-300 opacity-0 p-4">
  <div class="glass-panel w-full max-w-md p-4 sm:p-6 max-h-[85vh] flex flex-col transform scale-95 transition-transform duration-300" id="avatarModalContent">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-gray-800 dark:text-white">เลือกรูปโปรไฟล์</h3>
      <button type="button" onclick="closeAvatarModal()" class="text-gray-500 hover:text-brand-red transition-colors">
        <i class='bx bx-x text-2xl'></i>
      </button>
    </div>
    <div class="overflow-y-auto grid grid-cols-4 sm:grid-cols-5 gap-2 sm:gap-3 p-1" id="avatarGrid"></div>
  </div>
</div>

<script>
const switchForm = (type) => {
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');

  if (type === 'register') {
    loginForm.classList.remove('active-form');
    loginForm.classList.add('hidden-form');
    
    setTimeout(() => {
      registerForm.classList.remove('hidden-form');
      registerForm.classList.add('active-form');
      setTimeout(resizeCanvas, 50);
    }, 150);
    
  } else {
    registerForm.classList.remove('active-form');
    registerForm.classList.add('hidden-form');
    
    setTimeout(() => {
      loginForm.classList.remove('hidden-form');
      loginForm.classList.add('active-form');
    }, 150);
  }
}

const togglePassword = (inputId, iconId) => {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  
  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace('bx-hide', 'bx-show');
    icon.classList.add('text-brand-blue');
  } else {
    input.type = "password";
    icon.classList.replace('bx-show', 'bx-hide');
    icon.classList.remove('text-brand-blue');
  }
}

const handleFileUpload = (event) => {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('profilePreview').src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}

const openAvatarModal = () => {
  const modal = document.getElementById('avatarModal');
  const content = document.getElementById('avatarModalContent');
  modal.classList.remove('hidden');
  modal.classList.add('flex');

  void modal.offsetWidth;
  modal.classList.remove('opacity-0');
  content.classList.remove('scale-95');
}

const closeAvatarModal = () => {
  const modal = document.getElementById('avatarModal');
  const content = document.getElementById('avatarModalContent');
  modal.classList.add('opacity-0');
  content.classList.add('scale-95');
  setTimeout(() => {
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }, 300);
}

const selectAvatar = (src) => {
  document.getElementById('profilePreview').src = src;
  closeAvatarModal();
}

const loadAvatars = () => {
  const grid = document.getElementById('avatarGrid');
  if (!grid) return;

  for(let i = 1; i <= 50; i++) {
    const url = 'https://cdn.jsdelivr.net/gh/EPICCODING17/image/user-' + i + '.png';
    
    const img = document.createElement('img');
    img.src = url;
    img.loading = "lazy";
    img.className = "w-full aspect-square rounded-full object-cover cursor-pointer hover:scale-110 hover:ring-2 ring-brand-blue transition-all bg-white dark:bg-gray-800 p-1 shadow-sm";
    img.onclick = () => selectAvatar(url);
    grid.appendChild(img);
  }
}

const canvas = document.getElementById('signatureCanvas');
const ctx = canvas ? canvas.getContext('2d') : null;
let isDrawing = false;
let currentPenColor = '#000000';
let currentPenSize = 2;

const resizeCanvas = () => {
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  ctx.strokeStyle = currentPenColor;
  ctx.lineWidth = currentPenSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

const startDrawing = (e) => {
  isDrawing = true;
  const { x, y } = getCoordinates(e);
  ctx.beginPath();
  ctx.moveTo(x, y);
}

const stopDrawing = () => {
  isDrawing = false;
  ctx.beginPath();
}

const getCoordinates = (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  if (e.touches && e.touches.length > 0) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

const draw = (e) => {
  if (!isDrawing) return;
  e.preventDefault();

  const { x, y } = getCoordinates(e);

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

if (canvas) {
  canvas.addEventListener('mousedown', startDrawing);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDrawing);
  canvas.addEventListener('mouseout', stopDrawing);

  canvas.addEventListener('touchstart', startDrawing, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDrawing);
  canvas.addEventListener('touchcancel', stopDrawing);
}

const clearSignature = () => {
  if (ctx) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  const sigPreview = document.getElementById('sigPreview');
  const sigUploadPlaceholder = document.getElementById('sigUploadPlaceholder');
  const sigUploadInput = document.getElementById('sigUpload');
  
  if (sigPreview && sigUploadPlaceholder) {
    sigPreview.src = "";
    sigPreview.classList.add('hidden');
    sigUploadPlaceholder.classList.remove('hidden');
  }
  
  if (sigUploadInput) {
    sigUploadInput.value = "";
  }
  
  const profilePreview = document.getElementById('profilePreview');
  if (profilePreview) {
    profilePreview.src = "https://cdn.jsdelivr.net/gh/EPICCODING17/image/user-1.png";
  }
};

const setPenColor = (color, btnElement) => {
  currentPenColor = color;
  ctx.strokeStyle = color;
  
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.classList.remove('ring-2');
  });
  if(btnElement) btnElement.classList.add('ring-2');
}

const setPenSize = (size) => {
  currentPenSize = size;
  ctx.lineWidth = size;
}

const setSigMode = (mode) => {
  const drawMode = document.getElementById('sigDrawMode');
  const uploadMode = document.getElementById('sigUploadMode');
  const btnDraw = document.getElementById('btnSigDraw');
  const btnUpload = document.getElementById('btnSigUpload');

  const activeClass = "bg-white dark:bg-gray-600 shadow-sm text-brand-blue font-medium".split(" ");
  const inactiveClass = "text-gray-500 dark:text-gray-300 hover:text-gray-700 dark:hover:text-white".split(" ");

  if (mode === 'draw') {
    drawMode.classList.remove('hidden');
    uploadMode.classList.add('hidden');
    
    btnDraw.classList.remove(...inactiveClass);
    btnDraw.classList.add(...activeClass);
    
    btnUpload.classList.remove(...activeClass);
    btnUpload.classList.add(...inactiveClass);
    
    resizeCanvas();
  } else {
    drawMode.classList.add('hidden');
    uploadMode.classList.remove('hidden');
    
    btnUpload.classList.remove(...inactiveClass);
    btnUpload.classList.add(...activeClass);
    
    btnDraw.classList.remove(...activeClass);
    btnDraw.classList.add(...inactiveClass);
  }
}

const handleSigUpload = (event) => {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('sigPreview');
      const placeholder = document.getElementById('sigUploadPlaceholder');
      preview.src = e.target.result;
      preview.classList.remove('hidden');
      placeholder.classList.add('hidden');
    }
    reader.readAsDataURL(file);
  }
}

const registerUser = () => {
  event.preventDefault();

  const username = document.querySelector('input[name="username"]').value.trim();
  const firstName = document.getElementById('first_name').value.trim();
  const lastName = document.getElementById('last_name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  
  if (!username || !firstName || !lastName || !email || !password) {
    showToast("กรุณากรอกข้อมูลให้ครบทุกช่อง", true, "error");
    return;
  }
  
  const fullname = firstName + " " + lastName;

  const profileImgSrc = document.getElementById('profilePreview').src;
  let profileCheck = ""; 
  let profileImageDataUrl = profileImgSrc;

  if (profileImgSrc.startsWith('data:image')) {
    profileCheck = "upload";
  }

  let signatureImageDataUrl = "";
  let signatureCheck = "";
  const drawMode = !document.getElementById('sigDrawMode').classList.contains('hidden');
  
  if (drawMode) {
    const canvas = document.getElementById('signatureCanvas');
    signatureImageDataUrl = canvas.toDataURL("image/png");
    signatureCheck = "upload"; 
  } else {
    const sigPreview = document.getElementById('sigPreview').src;
    if (sigPreview && sigPreview.startsWith('data:image')) {
      signatureImageDataUrl = sigPreview;
      signatureCheck = "upload";
    }
  }

  if (!signatureImageDataUrl || signatureImageDataUrl === document.location.href) {
     showToast("กรุณาเซ็นชื่อหรืออัปโหลดรูปลายเซ็น", true, "error");
     return;
  }

  const obj = {
    username: username,
    password: password,
    fullname: fullname,
    email: email,
    profileCheck: profileCheck,
    profileImageDataUrl: profileImageDataUrl,
    profileFiletype: "image/png",
    profileFilename: "profile_" + username,
    signatureCheck: signatureCheck,
    signatureImageDataUrl: signatureImageDataUrl,
    signatureFiletype: "image/png",
    signatureFilename: "signature_" + username
  };

  showLoader(); 

  google.script.run.withSuccessHandler((res) => {
    hideLoader(); 
    
    if (res === true) {
      showToast("สมัครสมาชิกสำเร็จ!", true, "success");
      document.getElementById('registerForm').reset();
      clearSignature();
      switchForm('login');
    } else {
      showToast("ชื่อผู้ใช้งานนี้ถูกใช้งานแล้ว กรุณาเปลี่ยนใหม่", true, "error");
    }
  }).withFailureHandler((err) => {
    hideLoader();
    showToast("เกิดข้อผิดพลาด: " + err.message, true, "error");
  }).registers(obj);
};

const forgotPassword = () => {
  event.preventDefault();

  const username = document.getElementById('loginusername').value.trim();
  
  if (!username) {
    showToast("กรุณากรอก 'ชื่อผู้ใช้งาน' ในช่องเพื่อกู้รหัสผ่าน", true, "error");
    document.getElementById('loginusername').focus();
    return;
  }

  showLoader();

  google.script.run.withSuccessHandler((res) => {
    hideLoader();
    if (res.success) {
      showToast("ระบบได้ส่งรหัสผ่านไปยังอีเมลของคุณแล้ว", true, "success");
    } else {
      showToast(res.message, true, "error");
    }
  }).withFailureHandler((err) => {
    hideLoader();
    showToast("เกิดข้อผิดพลาด: " + err.message, true, "error");
  }).sendForgotPassword(username);
};
</script>
